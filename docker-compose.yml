version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: decaid-postgres
    environment:
      POSTGRES_USER: decaid
      POSTGRES_PASSWORD: decaid
      POSTGRES_DB: decaid
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U decaid"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
