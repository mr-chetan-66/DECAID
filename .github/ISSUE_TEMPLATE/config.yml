name: Bug Report
about: Report bugs or issues with DECAID system functionality
title: "[Bug] "
body: |
  <!--- Thank you for reporting a bug! Please fill out the sections below -->
  
  **Describe the bug**
  A clear and concise description of what the bug is.
  
  **To Reproduce**
  Steps to reproduce the behavior:
  1. Go to '...'
  2. Click on '....'
  3. Scroll down to '....'
  4. See error
  
  **Expected behavior**
  A clear and concise description of what you expected to happen.
  
  **Actual behavior**
  A clear and concise description of what actually happened.
  
  **Screenshots**
  If applicable, add screenshots to help explain your problem.
  
  **Environment**
  - OS: [e.g. Windows 11, macOS 13.0]
  - Browser: [e.g. Chrome 120, Firefox 121]
  - DECAID Version: [e.g. v1.0.0]
  
  **Additional context**
  Add any other context about the problem here.
  
  **Possible Solution**
  If you have ideas on how to fix it, let us know.

labels: ["bug", "needs-triage"]
assignees: []
projects: []
milestone: ""

---
name: Feature Request
about: Suggest new features or enhancements for DECAID
title: "[Feature] "
body: |
  <!--- Thank you for suggesting a feature! Please fill out the sections below -->
  
  **Feature Description**
  A clear and concise description of the feature you'd like to see added to DECAID.
  
  **Problem Statement**
  What problem does this feature solve? What limitation does it address?
  
  **Proposed Solution**
  How do you envision this feature working? Please describe in detail.
  
  **Use Cases**
  Describe specific scenarios where this feature would be valuable:
  1. As a [user type], I want to [action] so that [benefit]
  2. As a [user type], I need to [capability] in order to [goal]
  
  **Alternatives Considered**
  What other approaches or solutions have you considered? Why is your preferred approach better?
  
  **Priority**
  - [ ] High - Critical for core functionality
  - [ ] Medium - Important enhancement
  - [ ] Low - Nice to have
  
  **Additional Notes**
  Any other context, mockups, or technical considerations about this feature.
  
  **Implementation Ideas**
  If you have technical thoughts on how this could be implemented, share them here.

labels: ["enhancement", "needs-discussion"]
assignees: []
projects: []
milestone: ""

